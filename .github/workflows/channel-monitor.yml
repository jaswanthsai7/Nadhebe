name: Daily YouTube Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check RSS and Trigger Pipeline
        env:
          API_PIPELINE_URL: ${{ secrets.API_PIPELINE_URL }}
          PIPELINE_AUTH_TOKEN: ${{ secrets.PIPELINE_AUTH_TOKEN }}
        run: |
          node scripts/channel-monitor.js
